<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CIFAR-10 Image Classifier</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f2f2f2;
            text-align:center;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        img{
            width:250px;
            height:250px;
            object-fit:contain;
            border:1px solid #ddd;
            margin-top:15px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
            margin-top:15px;
            border-radius:5px;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:green;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>CIFAR-10 Image Classifier</h2>

    <input type="file" id="imageInput">

    <br>

    <img id="preview">

    <br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

</div>

<script>

let imageData="";

document.getElementById("imageInput").addEventListener("change",function(e){

    const file=e.target.files[0];

    const reader=new FileReader();

    reader.onload=function(){

        document.getElementById("preview").src=reader.result;

        imageData=reader.result.split(",")[1];

    }

    reader.readAsDataURL(file);

});


function predict(){

    fetch("/predict",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            image:imageData
        })

    })

    .then(response=>response.json())

    .then(data=>{

        document.getElementById("result").innerHTML=
        `
        <p>Class : <b>${data[0].class}</b></p>
        <p>Confidence : <b>${data[0].confidence}</b></p>
        `;

    });

}

</script>

</body>

</html>
